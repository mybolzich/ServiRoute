<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#12140f;--s:#1a1d16;--s2:#22271c;--b:#333a29;--a:#7fb069;--ad:#26361f;--g:#7fb069;--gd:#26361f;--y:#e0a458;--yd:#3d2f14;--r:#e2725b;--rd:#3d1f18;--t:#eef0e8;--td:#8e9482;--tm:#5b6151;--rad:10px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--disp:'Space Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}

/* Shared */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rad);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s cubic-bezier(.4,0,.2,1);white-space:nowrap;letter-spacing:.1px}
.btn-p{box-shadow:0 1px 2px rgba(0,0,0,.2),0 0 0 1px rgba(127,176,105,.15)}
.btn-p:active{transform:translateY(1px)}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:#5590ff}
.btn-s{background:var(--s2);color:var(--t);border:1px solid var(--b)}.btn-s:hover{border-color:var(--a);color:var(--a)}
.btn-g{background:transparent;color:var(--td);padding:6px 10px}.btn-g:hover{color:var(--t)}
.btn-ok{background:var(--gd);color:var(--g);border:1px solid var(--g)}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
label{display:block;font-size:11px;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:var(--rad);color:var(--t);font-family:var(--sans);font-size:14px;padding:10px 14px;outline:none;margin-bottom:16px}
input:focus,select:focus,textarea:focus{border-color:var(--a)}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--rad);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.err-box{background:var(--rd);border:1px solid var(--r);color:var(--r);border-radius:var(--rad);padding:10px 14px;font-size:13px;margin-bottom:16px}
.info-box{background:var(--ad);border:1px solid var(--a);color:#93b4ff;border-radius:var(--rad);padding:10px 14px;font-size:13px;margin-bottom:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--td);margin-bottom:14px}
.badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.b-draft{background:var(--s2);color:var(--td)}.b-dispatched{background:var(--ad);color:var(--a)}
.b-active{background:var(--yd);color:var(--y)}.b-done{background:var(--gd);color:var(--g)}
.b-skip{background:var(--rd);color:var(--r)}.b-pending{background:var(--s2);color:var(--td)}

/* Login */
#v-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 0%,#2a3a1e 0%,var(--bg) 55%),radial-gradient(ellipse at 90% 100%,#1f2e1a 0%,transparent 50%)}
.login-box{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:48px 40px;width:400px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1px rgba(127,176,105,.08)}

/* Modal */

/* Toggle */
.trow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b)}

.tgl input:checked+.tgl-s{background:var(--a)}
.tgl input:checked+.tgl-s::before{transform:translateX(18px)}

/* Opt grid */
.og{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.oc{border:2px solid var(--b);border-radius:var(--rad);padding:14px;cursor:pointer;transition:all .15s;background:var(--bg)}
.oc:hover{border-color:var(--a)}.oc.sel{border-color:var(--a);background:var(--ad)}
.oc-i{font-size:20px;margin-bottom:6px}.oc-t{font-size:13px;font-weight:600}.oc-d{font-size:11px;color:var(--td);margin-top:3px}

/* Crew toggles */
.ct{display:flex;flex-wrap:wrap;gap:8px}
.ctb{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--b);background:var(--s);color:var(--td);font-size:12px;font-weight:600;cursor:pointer}

/* Empty */

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:12px 18px;font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-color:var(--g);color:var(--g)}
#toast.bad{border-color:var(--r);color:var(--r)}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--td);padding:10px 14px;border-bottom:1px solid var(--b)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--b)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--s2)}
.csw{width:24px;height:24px;border-radius:50%;display:inline-block;border:2px solid var(--b)}

.drag-h{cursor:grab;color:var(--tm);font-size:16px;padding:2px;flex-shrink:0}
.drag-h:active{cursor:grabbing}
.divider{border:none;border-top:1px solid var(--b);margin:20px 0}

@media(max-width:768px){
  .side{display:none}
  .main{margin-left:0}
}
</style>

<!-- ═══ APP LOGIC ═══ -->
<script>
// ── State ────────────────────────────────────────────
// ── Global error catcher — nothing fails silently ────
window.onerror = function(msg, url, line, col, error){
  console.error('[GLOBAL ERROR]', msg, 'at line', line, error);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;background:#450a0a;border:2px solid #ef4444;color:#fecaca;padding:16px;border-radius:8px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap;';
  d.textContent = 'JS ERROR: ' + msg + '\nLine: ' + line + ':' + col;
  document.body.appendChild(d);
  return false;
};
window.addEventListener('unhandledrejection', function(e){
  console.error('[UNHANDLED PROMISE REJECTION]', e.reason);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;background:#450a0a;border:2px solid #ef4444;color:#fecaca;padding:16px;border-radius:8px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap;';
  d.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason)) + '\nCode: ' + (e.reason && e.reason.code || 'none');
  document.body.appendChild(d);
});

var CU = null;   // current firebase user
var isRegistering = false; // guard flag: prevents onAuthStateChanged from interrupting registration
var CP = null;   // current profile (firestore)
var CC = null;   // current company (firestore)
var crew = [];
var locs = [];
var routes = [];
var selRoute = null;
var selJobs = [];
var unsubs = [];
var dragI = null;

// ── Helpers ──────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function show(el){ el.style.display = 'block'; }
function hide(el){ el.style.display = 'none'; }

var _tt;
function toast(msg, ok){
  var t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + (ok ? 'ok' : 'bad');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.className = ''; }, 3500);
}

function msg(txt, isErr){
  var el = $('auth-msg');
  el.textContent = txt;
  el.className = isErr ? 'err-box' : 'info-box';
  show(el);
}

function hideMsg(){ hide($('auth-msg')); }

function badge(s){
  var m = {draft:'b-draft',dispatched:'b-dispatched',in_progress:'b-active',completed:'b-done',pending:'b-pending',skipped:'b-skip'};
  return '<span class="badge '+(m[s]||'b-draft')+'">'+(s||'draft').replace('_',' ')+'</span>';
}

function fmtMins(m){
  if(!m) return '—';
  if(m < 60) return m + 'min';
  return Math.floor(m/60) + 'h ' + (m%60) + 'm';
}

function fmtDate(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Route optimizer ──────────────────────────────────
function hav(a1,n1,a2,n2){
  var R=3959,dA=(a2-a1)*Math.PI/180,dN=(n2-n1)*Math.PI/180;
  var x=Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dN/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

function routeDist(dp,stops){
  if(!stops.length) return 0;
  var t=hav(dp.lat,dp.lng,stops[0].lat,stops[0].lng);
  for(var i=0;i<stops.length-1;i++) t+=hav(stops[i].lat,stops[i].lng,stops[i+1].lat,stops[i+1].lng);
  t+=hav(stops[stops.length-1].lat,stops[stops.length-1].lng,dp.lat,dp.lng);
  return t;
}

function optDist(dp,stops){
  if(stops.length<=1) return stops.map(function(s,i){s.sequence=i+1;return s;});
  var pts=[dp].concat(stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};}));
  var n=pts.length;
  var dm=[];for(var i=0;i<n;i++){dm[i]=[];for(var j=0;j<n;j++)dm[i][j]=i===j?0:hav(pts[i].lat,pts[i].lng,pts[j].lat,pts[j].lng);}
  var vis={0:true};var order=[];var cur=0;
  while(order.length<n-1){
    var best=-1,bd=Infinity;
    for(var i=0;i<n;i++){if(!vis[i]&&dm[cur][i]<bd){best=i;bd=dm[cur][i];}}
    if(best===-1)break;vis[best]=true;order.push(best);cur=best;
  }
  return order.map(function(idx,seq){var s=stops[idx-1];s.sequence=seq+1;return s;});
}

function optTime(dp,stops){
  if(stops.length<=1) return stops.map(function(s,i){s.sequence=i+1;return s;});
  var pts=[dp].concat(stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};}));
  var n=pts.length;
  var tm=[];for(var i=0;i<n;i++){tm[i]=[];for(var j=0;j<n;j++){if(i===j){tm[i][j]=0;continue;}var d=hav(pts[i].lat,pts[i].lng,pts[j].lat,pts[j].lng);tm[i][j]=(d/30)*60+(j>0?(stops[j-1].estimatedDuration||30):0);}}
  var vis={0:true};var order=[];var cur=0;
  while(order.length<n-1){
    var best=-1,bd=Infinity;
    for(var i=0;i<n;i++){if(!vis[i]&&tm[cur][i]<bd){best=i;bd=tm[cur][i];}}
    if(best===-1)break;vis[best]=true;order.push(best);cur=best;
  }
  return order.map(function(idx,seq){var s=stops[idx-1];s.sequence=seq+1;return s;});
}

function calcStats(dp,stops){
  var pts=stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};});
  var dist=routeDist(dp,pts);
  var drive=(dist/30)*60;
  var svc=stops.reduce(function(a,s){return a+(s.estimatedDuration||30);},0);
  return{distance:Math.round(dist*10)/10,driveTime:Math.round(drive),serviceTime:svc,totalTime:Math.round(drive+svc)};
}

// ── Auth ─────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(isRegistering) return; // Registration flow handles its own profile creation — don't race it
  if(user){
    CU = user;
    loadProfile(user.uid);
  } else {
    CU=null;CP=null;CC=null;
    unsubs.forEach(function(u){u();});
    unsubs=[];
    $('v-login').style.display='flex';
    hide($('v-app'));
  }
});

// Toggle forms

$('link-login').onclick=function(e){e.preventDefault();hideMsg();show($('f-login'));hide($('f-register'));};

// Login
$('btn-login').onclick = function(){
  hideMsg();
  var email=$('i-email').value.trim();
  var pass=$('i-pass').value;
  if(!email||!pass){msg('Enter email and password.',true);return;}
  this.textContent='Signing in…';this.disabled=true;
  var self=this;
  var timedOut=false;
  var timeoutId=setTimeout(function(){
    timedOut=true;
    msg('Timed out. Domain may not be authorized. Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname,true);
    self.textContent='Sign In';self.disabled=false;
  },15000);
  auth.signInWithEmailAndPassword(email,pass)
  .catch(function(e){
    clearTimeout(timeoutId);
    if(timedOut)return;
    var m=e.message;
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found') m='Incorrect email or password.';
    else if(e.code==='auth/too-many-requests') m='Too many attempts. Wait a few minutes.';
    else if(e.code==='auth/unauthorized-domain') m='Domain not authorized. Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname;
    msg(m,true);
  })
  .finally(function(){
    clearTimeout(timeoutId);
    if(!timedOut){self.textContent='Sign In';self.disabled=false;}
  });
};

// ── Timeline (Gantt-style) ────────────────────────────
var TL_START_HOUR=6, TL_END_HOUR=19; // 6am - 7pm window

function computeStopTimes(dispatch, stops){
  // Returns stops annotated with startMin/endMin (minutes from midnight), assumes crew departs at 7:00 AM
  var cursor = 7*60; // 7:00 AM in minutes
  var prev = dispatch;
  var out=[];
  stops.forEach(function(s){
    var lat=s.coordinates?s.coordinates.lat:0, lng=s.coordinates?s.coordinates.lng:0;
    var d = hav(prev.lat, prev.lng, lat, lng);
    var driveMin = (d/30)*60;
    cursor += driveMin;
    var startMin = cursor;
    var dur = s.estimatedDuration||30;
    cursor += dur;
    out.push(Object.assign({}, s, {startMin:startMin, endMin:cursor}));
    prev = {lat:lat,lng:lng};
  });
  return out;
}

function renderTimeline(date){
  var el=$('rt-timeline');
  if(!el)return;
  var dp=CC.dispatchLocation||{lat:0,lng:0};
  var totalMin=(TL_END_HOUR-TL_START_HOUR)*60;

  if(!routes.length){
    el.innerHTML='<div class="empty" style="padding:40px"><div class="empty-i">📊</div><div class="empty-t">No routes scheduled</div></div>';
    return;
  }

  // Hour ruler
  var hours=[];
  for(var h=TL_START_HOUR;h<=TL_END_HOUR;h++){
    hours.push('<div style="position:absolute;left:'+((h-TL_START_HOUR)/  (TL_END_HOUR-TL_START_HOUR)*100)+'%;top:0;bottom:0;border-left:1px solid var(--b);font-size:10px;color:var(--tm);padding-left:4px;padding-top:4px">'+formatHour(h)+'</div>');
  }

  var rows = routes.map(function(r){
    var c=crew.find(function(x){return x.id===r.crewId;});
    var jobs=allDayJobs.filter(function(j){return j.routeId===r.id;}).sort(function(a,b){return a.sequence-b.sequence;});
    var timed=computeStopTimes(dp,jobs);
    var sel=selRoute===r.id;

    var blocks=timed.map(function(j){
      var left=Math.max(0,(j.startMin-TL_START_HOUR*60)/totalMin*100);
      var width=Math.max(0.8,(j.endMin-j.startMin)/totalMin*100);
      return '<div title="'+esc(j.locationName)+' ('+minToClock(j.startMin)+'-'+minToClock(j.endMin)+')" style="position:absolute;left:'+left+'%;width:'+width+'%;top:6px;bottom:6px;background:'+(c?c.color:'#7c8499')+';border-radius:4px;opacity:'+(j.status==='completed'?'1':'0.55')+';cursor:pointer" onclick="event.stopPropagation();selAndShow(\''+r.id+'\')"></div>';
    }).join('');

    return '<div class="tl-row" onclick="selAndShow(\''+r.id+'\')" style="position:relative;height:44px;border-bottom:1px solid var(--b);cursor:pointer;background:'+(sel?'var(--ad)':'transparent')+'">'+
      '<div style="position:absolute;left:0;top:0;bottom:0;width:140px;display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--s);border-right:1px solid var(--b);z-index:2;font-size:12px;font-weight:600"><span class="crew-dot" style="background:'+(c?c.color:'#7c8499')+'"></span>'+esc(c?c.name:'—')+'</div>'+
      '<div style="position:absolute;left:140px;right:0;top:0;bottom:0">'+blocks+'</div>'+
    '</div>';
  }).join('');

  el.innerHTML=
    '<div style="position:sticky;top:0;height:22px;background:var(--s);border-bottom:1px solid var(--b);z-index:3">'+
      '<div style="position:absolute;left:140px;right:0;top:0;bottom:0">'+hours.join('')+'</div>'+
    '</div>'+
    '<div style="position:relative;min-width:900px">'+rows+'</div>';
}

function formatHour(h){
  var period=h>=12?'PM':'AM';
  var hh=h%12; if(hh===0)hh=12;
  return hh+period;
}
function minToClock(m){
  var h=Math.floor(m/60), mm=Math.round(m%60);
  var period=h>=12?'PM':'AM';
  var hh=h%12; if(hh===0)hh=12;
  return hh+':'+String(mm).padStart(2,'0')+period;
}

// ── Map ────────────────────────────────────────────────
function renderSchedulerMap(date){
  var mapEl=$('rt-map');
  if(!mapEl)return;

  if(schedMap){ schedMap.remove(); schedMap=null; schedMarkers={}; }

  var center=(CC.dispatchLocation&&CC.dispatchLocation.lat)?[CC.dispatchLocation.lat,CC.dispatchLocation.lng]:[28.1518,-82.3743];
  schedMap=L.map('rt-map',{zoomControl:true}).setView(center,11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(schedMap);

  var bounds=[];
  routes.forEach(function(r){
    var c=crew.find(function(x){return x.id===r.crewId;});
    var jobs=allDayJobs.filter(function(j){return j.routeId===r.id;}).sort(function(a,b){return a.sequence-b.sequence;});
    jobs.forEach(function(j){
      if(!j.coordinates || !j.coordinates.lat) return;
      var color = c?c.color:'#7c8499';
      var icon=L.divIcon({
        className:'',
        html:'<div style="width:22px;height:22px;border-radius:50%;background:'+color+';border:2px solid #fff;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4)">'+j.sequence+'</div>',
        iconSize:[22,22], iconAnchor:[11,11]
      });
      var marker=L.marker([j.coordinates.lat,j.coordinates.lng],{icon:icon}).addTo(schedMap);
      marker.bindTooltip(esc(j.locationName||''),{direction:'top',offset:[0,-10]});
      marker.on('click',function(){selAndShow(r.id);});
      bounds.push([j.coordinates.lat,j.coordinates.lng]);
    });
  });

  if(bounds.length){ schedMap.fitBounds(bounds,{padding:[40,40]}); }
}

function panMapToRoute(routeId){
  if(!schedMap)return;
  var jobs=allDayJobs.filter(function(j){return j.routeId===routeId && j.coordinates && j.coordinates.lat;});
  if(!jobs.length)return;
  var bounds=jobs.map(function(j){return [j.coordinates.lat,j.coordinates.lng];});
  schedMap.fitBounds(bounds,{padding:[60,60],maxZoom:15});
}

// Route actions
function dispatchRoute(id){
  db.collection('routes').doc(id).update({status:'dispatched',dispatchedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){toast('Route dispatched!',true);selAndShow(id);});
}

function reopt(id,method){
  if(!selJobs.length){toast('No stops',false);return;}
  var dp=CC.dispatchLocation||{lat:0,lng:0};
  var result=method==='dist'?optDist(dp,selJobs):optTime(dp,selJobs);
  var batch=db.batch();
  result.forEach(function(j){batch.update(db.collection('jobs').doc(j.id),{sequence:j.sequence,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
  batch.commit().then(function(){toast('Optimized!',true);selAndShow(id);});
}

function splitR(id){
  if(selJobs.length<2)return;
  var half=Math.floor(selJobs.length/2);
  var second=selJobs.slice(half);
  var route=routes.find(function(r){return r.id===id;});
  db.collection('routes').add({
    companyId:CC.id,routeDate:route.routeDate,routeName:route.routeName+' (Split)',
    description:'Split from '+route.routeName,crewId:route.crewId,status:'draft',
    jobCount:second.length,completedJobCount:0,optimizationMethod:'manual',
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    var batch=db.batch();
    second.forEach(function(j,i){batch.update(db.collection('jobs').doc(j.id),{routeId:ref.id,sequence:i+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
    batch.update(db.collection('routes').doc(id),{jobCount:half,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    return batch.commit();
  }).then(function(){toast('Route split!',true);selAndShow(id);var dt=$('rt-dt');if(dt)loadRouteList(dt.value);});
}

function removeJob(jobId,routeId){
  if(!confirm('Remove this stop?'))return;
  db.collection('jobs').doc(jobId).delete().then(function(){
    return db.collection('routes').doc(routeId).get();
  }).then(function(doc){
    var cnt=Math.max(0,(doc.data().jobCount||1)-1);
    return db.collection('routes').doc(routeId).update({jobCount:cnt,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }).then(function(){toast('Removed',true);selAndShow(routeId);var dt=$('rt-dt');if(dt)loadRouteList(dt.value);});
}

// Drag & drop
function dragS(e,i){dragI=i;e.dataTransfer.effectAllowed='move';}
function dragO(e){e.preventDefault();}
function dragD(e,toI,routeId){
  e.preventDefault();
  if(dragI===null||dragI===toI)return;
  var arr=selJobs.slice();
  var moved=arr.splice(dragI,1)[0];
  arr.splice(toI,0,moved);
  var batch=db.batch();
  arr.forEach(function(j,i){batch.update(db.collection('jobs').doc(j.id),{sequence:i+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
  batch.commit().then(function(){dragI=null;toast('Reordered',true);selAndShow(routeId);});
}

  return locs.map(function(l){
    var sel=gSelectedLocId===l.id;
    return '<div class="loc-item" data-id="'+l.id+'" onclick="focusLocation(\''+l.id+'\')" style="padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:'+(sel?'var(--ad)':'transparent')+';border:1px solid '+(sel?'var(--a)':'transparent')+'">'+
      '<div style="font-weight:600;font-size:13px">'+esc(l.name)+'</div>'+
      '<div style="font-size:11px;color:var(--td);margin-top:2px">'+esc(l.clientName||'No client')+'</div>'+
      '<div style="font-size:11px;color:var(--tm);margin-top:2px">'+esc(l.address||'No address')+'</div>'+
    '</div>';
  }).join('');
}

function initMap(){
  var center = (CC.dispatchLocation && CC.dispatchLocation.lat) ? [CC.dispatchLocation.lat, CC.dispatchLocation.lng] : [28.1518, -82.3743];

  // Destroy old map instance if re-rendering
  if(gMap){ gMap.remove(); gMap=null; gMarkers={}; gTempMarker=null; }

  gMap = L.map('loc-map', { zoomControl:true }).setView(center, 11);

  // Dark-themed free tile layer (CartoDB Dark Matter — no key needed, free for reasonable use)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(gMap);

  gMapReady=true;

  // Click map to drop a pin — opens editor for new location if none open
  gMap.on('click', function(e){
    var editorOpen = $('loc-editor') && $('loc-editor').style.display==='flex';
    if(!editorOpen){
      startNewLocation();
      setTimeout(function(){
        placeTempMarker(e.latlng.lat, e.latlng.lng);
        reverseGeocode(e.latlng.lat, e.latlng.lng);
      }, 50);
      return;
    }
    placeTempMarker(e.latlng.lat, e.latlng.lng);
    reverseGeocode(e.latlng.lat, e.latlng.lng);
  });

  renderAllMarkers();
}

function blueDot(color){
  return L.divIcon({
    className:'',
    html:'<div style="width:18px;height:18px;border-radius:50%;background:'+color+';border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',
    iconSize:[18,18],
    iconAnchor:[9,9]
  });
}

function renderAllMarkers(){
  if(!gMap)return;
  Object.keys(gMarkers).forEach(function(id){gMap.removeLayer(gMarkers[id]);});
  gMarkers={};

  locs.forEach(function(l){
    if(!l.coordinates || !l.coordinates.lat) return;
    var marker = L.marker([l.coordinates.lat, l.coordinates.lng], {
      icon: blueDot(gSelectedLocId===l.id ? '#22c55e' : '#3d7eff')
    }).addTo(gMap);
    marker.bindTooltip(l.name, {direction:'top', offset:[0,-10]});
    marker.on('click', function(){ focusLocation(l.id); });
    gMarkers[l.id]=marker;
  });
}

function focusLocation(id){
  gSelectedLocId=id;
  var l=locs.find(function(x){return x.id===id;});
  if(!l)return;
  if(l.coordinates && l.coordinates.lat && gMap){
    gMap.setView([l.coordinates.lat, l.coordinates.lng], 15, {animate:true});
  }
  renderAllMarkers();
  var scroll=$('loc-list-scroll');
  if(scroll) scroll.innerHTML=renderLocListItems();
  openLocationEditor(l);
}

function startNewLocation(){
  gSelectedLocId=null;
  openLocationEditor(null);
}

function openLocationEditor(loc){
  var isNew = !loc;
  var l = loc || {name:'',clientName:'',address:'',clientPhone:'',defaultServiceDuration:30,serviceNotes:'',coordinates:null};

  var editor=$('loc-editor');
  editor.style.display='flex';
  editor.innerHTML=
    '<div style="padding:20px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center">'+
      '<div class="pg-t" style="font-size:16px">'+(isNew?'New Location':'Edit Location')+'</div>'+
      '<button class="btn btn-g" onclick="closeLocationEditor()">✕</button>'+
    '</div>'+
    '<div style="flex:1;overflow-y:auto;padding:20px">'+
      '<label>Location Name</label><input type="text" id="le-name" value="'+esc(l.name)+'" placeholder="Sienna Cove"/>'+
      '<label>Client Name</label><input type="text" id="le-client" value="'+esc(l.clientName||'')+'" placeholder="AMH Residential"/>'+
      '<label>Address</label>'+
      '<div style="display:flex;gap:6px;margin-bottom:6px">'+
        '<input type="text" id="le-addr" value="'+esc(l.address||'')+'" placeholder="1234 Main St, Tampa FL" style="margin-bottom:0;flex:1"/>'+
        '<button class="btn btn-s" style="padding:10px 12px" id="le-geocode-btn" onclick="geocodeAddress()" title="Find on map">🔍</button>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--td);margin-bottom:16px">Search an address, or click the map to drop a pin</div>'+
      '<div id="le-pin-status" style="font-size:11px;color:'+(l.coordinates&&l.coordinates.lat?'var(--g)':'var(--td)')+';margin-top:-10px;margin-bottom:16px">'+
        (l.coordinates&&l.coordinates.lat ? '📍 Pin set: '+l.coordinates.lat.toFixed(5)+', '+l.coordinates.lng.toFixed(5) : '📍 No pin yet')+
      '</div>'+
      '<div class="row2">'+
        '<div><label>Service Duration (min)</label><input type="number" id="le-dur" value="'+(l.defaultServiceDuration||30)+'"/></div>'+
        '<div><label>Client Phone</label><input type="text" id="le-phone" value="'+esc(l.clientPhone||'')+'"/></div>'+
      '</div>'+
      '<label>Service Notes</label><textarea id="le-notes" rows="3" style="resize:none" placeholder="Gate code, backyard access, special instructions…">'+esc(l.serviceNotes||'')+'</textarea>'+
    '</div>'+
    '<div style="padding:16px 20px;border-top:1px solid var(--b);display:flex;gap:8px">'+
      (isNew?'':'<button class="btn btn-s" style="color:var(--r);border-color:var(--r)" onclick="deleteLocationConfirm(\''+l.id+'\')">Delete</button>')+
      '<button class="btn btn-p" style="flex:1" onclick="saveLocation('+(isNew?'null':'\''+l.id+'\'')+')">'+(isNew?'Create Location':'Save Changes')+'</button>'+
    '</div>';

  window._leCoords = (l.coordinates && l.coordinates.lat) ? {lat:l.coordinates.lat,lng:l.coordinates.lng} : null;

  if(window._leCoords && gMap){
    placeTempMarker(window._leCoords.lat, window._leCoords.lng, true);
  } else if(gTempMarker){
    gMap.removeLayer(gTempMarker);
    gTempMarker=null;
  }

  // Enter key triggers geocode search
  var addrInput=$('le-addr');
  if(addrInput) addrInput.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();geocodeAddress();}};
}

function closeLocationEditor(){
  $('loc-editor').style.display='none';
  if(gTempMarker && gMap){gMap.removeLayer(gTempMarker);gTempMarker=null;}
  window._leCoords=null;
}

function placeTempMarker(lat,lng,skipPan){
  window._leCoords={lat:lat,lng:lng};
  if(gTempMarker){
    gTempMarker.setLatLng([lat,lng]);
  } else {
    gTempMarker = L.marker([lat,lng], {
      icon: blueDot('#f59e0b'),
      draggable:true
    }).addTo(gMap);
    gTempMarker.on('dragend', function(e){
      var pos=e.target.getLatLng();
      window._leCoords={lat:pos.lat,lng:pos.lng};
      updatePinStatus();
      reverseGeocode(pos.lat, pos.lng);
    });
  }
  if(!skipPan){ gMap.setView([lat,lng], 16, {animate:true}); }
  updatePinStatus();
}

function updatePinStatus(){
  var el=$('le-pin-status');
  if(!el || !window._leCoords) return;
  el.style.color='var(--g)';
  el.textContent='📍 Pin set: '+window._leCoords.lat.toFixed(5)+', '+window._leCoords.lng.toFixed(5);
}

// Free geocoding via OpenStreetMap Nominatim — no API key required
function geocodeAddress(){
  var addr=$('le-addr').value.trim();
  if(!addr){toast('Enter an address first',false);return;}
  var btn=$('le-geocode-btn');
  var origText=btn.textContent;
  btn.textContent='…';btn.disabled=true;

  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(addr))
    .then(function(r){return r.json();})
    .then(function(results){
      btn.textContent=origText;btn.disabled=false;
      if(results && results.length){
        var lat=parseFloat(results[0].lat);
        var lng=parseFloat(results[0].lon);
        placeTempMarker(lat,lng);
        $('le-addr').value = results[0].display_name;
        toast('Address found!',true);
      } else {
        toast('Could not find that address. Try clicking the map instead.',false);
      }
    })
    .catch(function(){
      btn.textContent=origText;btn.disabled=false;
      toast('Search failed. Try clicking the map instead.',false);
    });
}

// Free reverse geocoding via Nominatim
function reverseGeocode(lat,lng){
  var addrField=$('le-addr');
  if(!addrField || addrField.value.trim()) return; // Don't overwrite if user already typed something

  fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng)
    .then(function(r){return r.json();})
    .then(function(result){
      if(result && result.display_name && addrField && !addrField.value.trim()){
        addrField.value=result.display_name;
      }
    })
    .catch(function(){ /* silent fail — pin is still set, address just won't autofill */ });
}

function saveLocation(existingId){
  var name=$('le-name').value.trim();
  if(!name){toast('Location name required',false);return;}
  if(!window._leCoords){toast('Please set a pin — search the address or click the map',false);return;}

  var data={
    name:name,
    clientName:$('le-client').value.trim(),
    address:$('le-addr').value.trim(),
    coordinates:{lat:window._leCoords.lat,lng:window._leCoords.lng},
    clientPhone:$('le-phone').value.trim(),
    serviceNotes:$('le-notes').value.trim(),
    defaultServiceDuration:parseInt($('le-dur').value)||30,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  var promise;
  if(existingId){
    promise = db.collection('locations').doc(existingId).update(data);
  } else {
    data.companyId=CC.id;
    data.defaultJobType='maintenance';
    data.tags=[];
    data.active=true;
    data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
    promise = db.collection('locations').add(data);
  }

  promise.then(function(ref){
    toast(existingId?'Location updated!':'Location created!',true);
    closeLocationEditor();
    // locs array will auto-update via onSnapshot listener; refresh UI shortly after
    setTimeout(function(){
      var scroll=$('loc-list-scroll');
      if(scroll) scroll.innerHTML=renderLocListItems();
      renderAllMarkers();
    }, 400);
  }).catch(function(e){toast(e.message,false);});
}

function deleteLocationConfirm(id){
  if(!confirm('Delete this location? This cannot be undone.'))return;
  db.collection('locations').doc(id).update({active:false}).then(function(){
    toast('Location deleted',true);
    closeLocationEditor();
    setTimeout(function(){
      var scroll=$('loc-list-scroll');
      if(scroll) scroll.innerHTML=renderLocListItems();
      renderAllMarkers();
    },400);
  }).catch(function(e){toast(e.message,false);});
}

// ── Analytics ────────────────────────────────────────
function renderAnalytics(mc){
  var today=new Date().toISOString().slice(0,10);
  mc.innerHTML='<div class="pg on"><div class="pg-h"><div><div class="pg-t">Analytics</div><div class="pg-st">Planned vs Actual</div></div>'+
    '<input type="date" id="an-dt" value="'+today+'" style="margin-bottom:0;width:auto"/></div>'+
    '<div id="an-content"><p style="color:var(--td)">Loading…</p></div></div>';
  loadAnalytics(today);
  $('an-dt').onchange=function(){loadAnalytics(this.value);};
}

function loadAnalytics(date){
  var el=$('an-content');
  if(!el)return;
  db.collection('routes').where('companyId','==',CC.id).where('routeDate','==',date).get()
  .then(function(snap){
    var rs=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
    if(!rs.length){el.innerHTML='<div class="empty"><div class="empty-i">📈</div><div class="empty-t">No data for '+date+'</div></div>';return;}
    var totalJ=rs.reduce(function(a,r){return a+(r.jobCount||0);},0);
    var doneJ=rs.reduce(function(a,r){return a+(r.completedJobCount||0);},0);
    var pct=totalJ?Math.round(doneJ/totalJ*100):0;
    el.innerHTML='<div class="row3" style="margin-bottom:24px">'+
      '<div class="stat"><div class="stat-l">Completion</div><div class="stat-v">'+pct+'%</div><div class="stat-s">'+doneJ+' of '+totalJ+'</div></div>'+
      '<div class="stat"><div class="stat-l">Routes</div><div class="stat-v">'+rs.length+'</div></div>'+
      '<div class="stat"><div class="stat-l">Completed</div><div class="stat-v">'+rs.filter(function(r){return r.status==='completed';}).length+'</div></div></div>'+
      '<div class="card"><div class="sec-t">Per Crew — '+fmtDate(date)+'</div>'+
      '<table><thead><tr><th>Crew</th><th>Route</th><th>Stops</th><th>Done</th><th>Rate</th></tr></thead><tbody>'+
      rs.map(function(r){
        var c=crew.find(function(x){return x.id===r.crewId;});
        var p=r.jobCount?Math.round((r.completedJobCount||0)/r.jobCount*100):0;
        return '<tr><td><span class="crew-dot" style="background:'+(c?c.color:'#7c8499')+'"></span> '+(c?c.name:'—')+'</td><td>'+esc(r.routeName)+'</td><td>'+(r.jobCount||0)+'</td><td>'+(r.completedJobCount||0)+'</td><td><strong>'+p+'%</strong></td></tr>';
      }).join('')+'</tbody></table></div>';
  });
}

// ── Settings ─────────────────────────────────────────
function renderSettings(mc){
  mc.innerHTML='<div class="pg on"><div class="pg-h"><div><div class="pg-t">Settings</div><div class="pg-st">Proof-of-service & company</div></div></div>'+
    '<div class="row2">'+
    '<div class="card"><div class="sec-t">Proof of Service</div>'+
    '<div class="trow"><div><div class="tlabel">Before Photo</div><div class="tdesc">Required before starting</div></div><label class="tgl"><input type="checkbox" id="t-pb" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">After Photo</div><div class="tdesc">Required on completion</div></div><label class="tgl"><input type="checkbox" id="t-pa" onchange="savePOS()" checked/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Signature</div><div class="tdesc">Digital signature</div></div><label class="tgl"><input type="checkbox" id="t-sig" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Notes</div><div class="tdesc">Completion notes</div></div><label class="tgl"><input type="checkbox" id="t-nt" onchange="savePOS()" checked/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Voice Recording</div><div class="tdesc">Voice note</div></div><label class="tgl"><input type="checkbox" id="t-vc" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '</div>'+
    '<div class="card"><div class="sec-t">Company</div>'+
    '<label>Name</label><input type="text" id="set-name" value="'+esc(CC.name||'')+'"/>'+
    '<label>Dispatch Address</label><input type="text" id="set-addr" value="'+esc((CC.dispatchLocation||{}).address||'')+'"/>'+
    '<div class="row2"><div><label>Lat</label><input type="number" id="set-lat" value="'+((CC.dispatchLocation||{}).lat||'')+'" step="0.0001"/></div>'+
    '<div><label>Lng</label><input type="number" id="set-lng" value="'+((CC.dispatchLocation||{}).lng||'')+'" step="0.0001"/></div></div>'+
    '<button class="btn btn-p" onclick="saveCo()">Save</button></div></div></div>';

  // Load current POS settings
  db.collection('proofSettings').doc(CC.id).get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    if($('t-pb'))$('t-pb').checked=!!d.requirePhotoBefore;
    if($('t-pa'))$('t-pa').checked=!!d.requirePhotoAfter;
    if($('t-sig'))$('t-sig').checked=!!d.requireSignature;
    if($('t-nt'))$('t-nt').checked=!!d.requireNotes;
    if($('t-vc'))$('t-vc').checked=!!d.requireVoiceRecording;
  });
}

function savePOS(){
  db.collection('proofSettings').doc(CC.id).set({
    requirePhotoBefore:$('t-pb').checked,requirePhotoAfter:$('t-pa').checked,
    requireSignature:$('t-sig').checked,requireNotes:$('t-nt').checked,
    requireVoiceRecording:$('t-vc').checked,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).then(function(){toast('Saved',true);});
}

function saveCo(){
  var name=$('set-name').value.trim();
  var addr=$('set-addr').value.trim();
  var lat=parseFloat($('set-lat').value)||0;
  var lng=parseFloat($('set-lng').value)||0;
  db.collection('companies').doc(CC.id).update({
    name:name,dispatchLocation:{lat:lat,lng:lng,address:addr},
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    CC.name=name;CC.dispatchLocation={lat:lat,lng:lng,address:addr};
    $('s-co').textContent=name;
    toast('Saved',true);
  });
}

// Escape key closes modals
document.onkeydown=function(e){
  if(e.key==='Escape') document.querySelectorAll('.mo.open').forEach(function(m){m.remove();});
};
</script>
