<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2437;--b:#2a3045;--a:#3d7eff;--ad:#1e3a7a;--g:#22c55e;--gd:#14532d;--y:#f59e0b;--yd:#451a03;--r:#ef4444;--rd:#450a0a;--t:#e8eaf0;--td:#7c8499;--tm:#4a5168;--rad:10px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}

/* Shared */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rad);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:#5590ff}
.btn-s{background:var(--s2);color:var(--t);border:1px solid var(--b)}.btn-s:hover{border-color:var(--a);color:var(--a)}
.btn-g{background:transparent;color:var(--td);padding:6px 10px}.btn-g:hover{color:var(--t)}
.btn-ok{background:var(--gd);color:var(--g);border:1px solid var(--g)}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
label{display:block;font-size:11px;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:var(--rad);color:var(--t);font-family:var(--sans);font-size:14px;padding:10px 14px;outline:none;margin-bottom:16px}
input:focus,select:focus,textarea:focus{border-color:var(--a)}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--rad);padding:20px}
.err-box{background:var(--rd);border:1px solid var(--r);color:var(--r);border-radius:var(--rad);padding:10px 14px;font-size:13px;margin-bottom:16px}
.info-box{background:var(--ad);border:1px solid var(--a);color:#93b4ff;border-radius:var(--rad);padding:10px 14px;font-size:13px;margin-bottom:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--td);margin-bottom:14px}
.badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* Modal */

/* Toggle */
.trow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b)}
.trow:last-child{border-bottom:none}
.tlabel{font-size:13px;font-weight:500}.tdesc{font-size:12px;color:var(--td);margin-top:2px}
.tgl{position:relative;width:40px;height:22px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;inset:0;background:var(--b);border-radius:11px;cursor:pointer;transition:background .2s}
.tgl-s::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s}
.tgl input:checked+.tgl-s{background:var(--a)}
.tgl input:checked+.tgl-s::before{transform:translateX(18px)}

/* Opt grid */
.og{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.oc{border:2px solid var(--b);border-radius:var(--rad);padding:14px;cursor:pointer;transition:all .15s;background:var(--bg)}
.oc:hover{border-color:var(--a)}.oc.sel{border-color:var(--a);background:var(--ad)}
.oc-i{font-size:20px;margin-bottom:6px}.oc-t{font-size:13px;font-weight:600}.oc-d{font-size:11px;color:var(--td);margin-top:3px}

/* Crew toggles */
.ct{display:flex;flex-wrap:wrap;gap:8px}
.ctb{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--b);background:var(--s);color:var(--td);font-size:12px;font-weight:600;cursor:pointer}
.ctb.on{color:var(--t);border-color:currentColor}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--td)}
.empty-i{font-size:40px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600;color:var(--t);margin-bottom:6px}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:12px 18px;font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-color:var(--g);color:var(--g)}
#toast.bad{border-color:var(--r);color:var(--r)}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--td);padding:10px 14px;border-bottom:1px solid var(--b)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--b)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--s2)}
.csw{width:24px;height:24px;border-radius:50%;display:inline-block;border:2px solid var(--b)}

.drag-h{cursor:grab;color:var(--tm);font-size:16px;padding:2px;flex-shrink:0}
.drag-h:active{cursor:grabbing}
.divider{border:none;border-top:1px solid var(--b);margin:20px 0}

@media(max-width:768px){
  .side{display:none}
  .main{margin-left:0}
}
</style>

<!-- ═══ APP LOGIC ═══ -->
<script>
// ── State ────────────────────────────────────────────
var CU = null;   // current firebase user
var isRegistering = false; // guard flag: prevents onAuthStateChanged from interrupting registration
var CP = null;   // current profile (firestore)
var CC = null;   // current company (firestore)
var crew = [];
var locs = [];
var routes = [];
var selRoute = null;
var selJobs = [];
var unsubs = [];
var dragI = null;

// ── Helpers ──────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function show(el){ el.style.display = ''; }
function hide(el){ el.style.display = 'none'; }

var _tt;
function toast(msg, ok){
  var t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + (ok ? 'ok' : 'bad');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.className = ''; }, 3500);
}

function msg(txt, isErr){
  var el = $('auth-msg');
  el.textContent = txt;
  el.className = isErr ? 'err-box' : 'info-box';
  show(el);
}

function hideMsg(){ hide($('auth-msg')); }

function badge(s){
  var m = {draft:'b-draft',dispatched:'b-dispatched',in_progress:'b-active',completed:'b-done',pending:'b-pending',skipped:'b-skip'};
  return '<span class="badge '+(m[s]||'b-draft')+'">'+(s||'draft').replace('_',' ')+'</span>';
}

function fmtMins(m){
  if(!m) return '—';
  if(m < 60) return m + 'min';
  return Math.floor(m/60) + 'h ' + (m%60) + 'm';
}

function fmtDate(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Route optimizer ──────────────────────────────────
function hav(a1,n1,a2,n2){
  var R=3959,dA=(a2-a1)*Math.PI/180,dN=(n2-n1)*Math.PI/180;
  var x=Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dN/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

function routeDist(dp,stops){
  if(!stops.length) return 0;
  var t=hav(dp.lat,dp.lng,stops[0].lat,stops[0].lng);
  for(var i=0;i<stops.length-1;i++) t+=hav(stops[i].lat,stops[i].lng,stops[i+1].lat,stops[i+1].lng);
  t+=hav(stops[stops.length-1].lat,stops[stops.length-1].lng,dp.lat,dp.lng);
  return t;
}

function optDist(dp,stops){
  if(stops.length<=1) return stops.map(function(s,i){s.sequence=i+1;return s;});
  var pts=[dp].concat(stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};}));
  var n=pts.length;
  var dm=[];for(var i=0;i<n;i++){dm[i]=[];for(var j=0;j<n;j++)dm[i][j]=i===j?0:hav(pts[i].lat,pts[i].lng,pts[j].lat,pts[j].lng);}
  var vis={0:true};var order=[];var cur=0;
  while(order.length<n-1){
    var best=-1,bd=Infinity;
    for(var i=0;i<n;i++){if(!vis[i]&&dm[cur][i]<bd){best=i;bd=dm[cur][i];}}
    if(best===-1)break;vis[best]=true;order.push(best);cur=best;
  }
  return order.map(function(idx,seq){var s=stops[idx-1];s.sequence=seq+1;return s;});
}

function optTime(dp,stops){
  if(stops.length<=1) return stops.map(function(s,i){s.sequence=i+1;return s;});
  var pts=[dp].concat(stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};}));
  var n=pts.length;
  var tm=[];for(var i=0;i<n;i++){tm[i]=[];for(var j=0;j<n;j++){if(i===j){tm[i][j]=0;continue;}var d=hav(pts[i].lat,pts[i].lng,pts[j].lat,pts[j].lng);tm[i][j]=(d/30)*60+(j>0?(stops[j-1].estimatedDuration||30):0);}}
  var vis={0:true};var order=[];var cur=0;
  while(order.length<n-1){
    var best=-1,bd=Infinity;
    for(var i=0;i<n;i++){if(!vis[i]&&tm[cur][i]<bd){best=i;bd=tm[cur][i];}}
    if(best===-1)break;vis[best]=true;order.push(best);cur=best;
  }
  return order.map(function(idx,seq){var s=stops[idx-1];s.sequence=seq+1;return s;});
}

function calcStats(dp,stops){
  var pts=stops.map(function(s){return{lat:s.coordinates?s.coordinates.lat:0,lng:s.coordinates?s.coordinates.lng:0};});
  var dist=routeDist(dp,pts);
  var drive=(dist/30)*60;
  var svc=stops.reduce(function(a,s){return a+(s.estimatedDuration||30);},0);
  return{distance:Math.round(dist*10)/10,driveTime:Math.round(drive),serviceTime:svc,totalTime:Math.round(drive+svc)};
}

// ── Auth ─────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(isRegistering) return; // Registration flow handles its own profile creation — don't race it
  if(user){
    CU = user;
    loadProfile(user.uid);
  } else {
    CU=null;CP=null;CC=null;
    unsubs.forEach(function(u){u();});
    unsubs=[];
    $('v-login').style.display='flex';
    hide($('v-app'));
  }
});

// Toggle forms
$('link-reg').onclick=function(e){e.preventDefault();hideMsg();hide($('f-login'));show($('f-register'));};
$('link-login').onclick=function(e){e.preventDefault();hideMsg();show($('f-login'));hide($('f-register'));};

// Login
$('btn-login').onclick = function(){
  hideMsg();
  var email=$('i-email').value.trim();
  var pass=$('i-pass').value;
  if(!email||!pass){msg('Enter email and password.',true);return;}
  this.textContent='Signing in…';this.disabled=true;
  var self=this;
  var timedOut=false;
  var timeoutId=setTimeout(function(){
    timedOut=true;
    msg('Timed out. Domain may not be authorized. Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname,true);
    self.textContent='Sign In';self.disabled=false;
  },15000);
  auth.signInWithEmailAndPassword(email,pass)
  .catch(function(e){
    clearTimeout(timeoutId);
    if(timedOut)return;
    var m=e.message;
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found') m='Incorrect email or password.';
    else if(e.code==='auth/too-many-requests') m='Too many attempts. Wait a few minutes.';
    else if(e.code==='auth/unauthorized-domain') m='Domain not authorized. Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname;
    msg(m,true);
  })
  .finally(function(){
    clearTimeout(timeoutId);
    if(!timedOut){self.textContent='Sign In';self.disabled=false;}
  });
};

// Enter key on login
$('i-pass').onkeydown=function(e){if(e.key==='Enter')$('btn-login').click();};

// Register
$('btn-reg').onclick = function(){
  hideMsg();
  var company=$('i-company').value.trim();
  var name=$('i-name').value.trim();
  var email=$('i-reg-email').value.trim();
  var pass=$('i-reg-pass').value;
  var lat=parseFloat($('i-lat').value)||0;
  var lng=parseFloat($('i-lng').value)||0;
  if(!company||!name||!email||!pass){msg('All fields required.',true);return;}
  if(pass.length<6){msg('Password needs 6+ characters.',true);return;}

  this.textContent='Creating…';this.disabled=true;
  isRegistering=true;
  var self=this;
  console.log('[REG] Starting registration for',email);

  // Safety timeout — if nothing resolves in 15s, show error instead of hanging
  var timedOut=false;
  var timeoutId=setTimeout(function(){
    timedOut=true;
    console.error('[REG] TIMEOUT after 15s');
    msg('Request timed out. This usually means your domain is not authorized in Firebase. Go to Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname,true);
    self.textContent='Create Company & Sign In';self.disabled=false;
  },15000);

  // Try create user, or sign in if exists
  console.log('[REG] Step 1: createUserWithEmailAndPassword');
  var p = auth.createUserWithEmailAndPassword(email,pass)
    .then(function(cred){console.log('[REG] Step 1 OK - new user created:',cred.user.uid);return cred;})
    .catch(function(e){
      console.warn('[REG] Step 1 failed:',e.code,e.message);
      if(e.code==='auth/email-already-in-use'){
        console.log('[REG] Email exists, trying sign in instead');
        return auth.signInWithEmailAndPassword(email,pass)
          .then(function(cred){console.log('[REG] Signed in existing user:',cred.user.uid);return cred;});
      }
      throw e;
    });

  var savedUid=null;

  p.then(function(cred){
    savedUid=cred.user.uid;
    CU=cred.user;
    console.log('[REG] Step 2: checking if profile exists for',savedUid);
    // Check if profile already exists
    return db.collection('users').doc(savedUid).get().then(function(doc){
      if(doc.exists){console.log('[REG] Profile already exists, skipping creation');return;}

      console.log('[REG] Step 3: creating company doc');
      // Create company
      return db.collection('companies').add({
        name:company,slug:company.toLowerCase().replace(/\s+/g,'-'),
        dispatchLocation:{lat:lat,lng:lng,address:''},timezone:'America/New_York',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      }).then(function(compRef){
        console.log('[REG] Step 3 OK - company created:',compRef.id);
        console.log('[REG] Step 4: creating user profile doc');
        // Create user profile
        return db.collection('users').doc(savedUid).set({
          companyId:compRef.id,email:email,fullName:name,phone:'',role:'owner',active:true,crewId:null,
          permissions:{canViewAllCrews:true,canEditOwnRoutes:true,canManageUsers:true},
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        }).then(function(){
          console.log('[REG] Step 4 OK - profile created');
          console.log('[REG] Step 5: creating proofSettings doc');
          return db.collection('proofSettings').doc(compRef.id).set({
            requirePhotoBefore:false,requirePhotoAfter:true,
            requireSignature:false,requireNotes:true,requireVoiceRecording:false
          }).then(function(){console.log('[REG] Step 5 OK - proofSettings created');});
        });
      });
    });
  })
  .then(function(){
    // Success — clear timeout, unblock auth listener, manually load the app
    console.log('[REG] All steps complete! Loading app for uid:',savedUid);
    clearTimeout(timeoutId);
    if(timedOut){console.warn('[REG] Already timed out, ignoring late success');return;}
    isRegistering=false;
    loadProfile(savedUid);
  })
  .catch(function(e){
    console.error('[REG] FAILED at some step:',e.code,e.message,e);
    clearTimeout(timeoutId);
    isRegistering=false;
    if(timedOut)return; // Already showed timeout message
    var m=e.message;
    if(e.code==='auth/invalid-email') m='Invalid email address.';
    else if(e.code==='auth/weak-password') m='Password needs 6+ characters.';
    else if(e.code==='auth/operation-not-allowed') m='Enable Email/Password in Firebase Console → Authentication → Sign-in method.';
    else if(e.code==='auth/unauthorized-domain') m='This domain is not authorized. Go to Firebase Console → Authentication → Settings → Authorized domains → add: '+window.location.hostname;
    msg(m,true);
  })
  .finally(function(){
    clearTimeout(timeoutId);
    if(!timedOut){self.textContent='Create Company & Sign In';self.disabled=false;}
  });
};

// Load profile — creates missing Firestore data if needed
function loadProfile(uid){
  console.log('[LOADPROFILE] Called for uid:',uid);
  db.collection('users').doc(uid).get().then(function(doc){
    console.log('[LOADPROFILE] users doc exists?',doc.exists);
    if(!doc.exists){
      // User in Auth but no Firestore profile — redirect to register
      console.warn('[LOADPROFILE] No profile found, redirecting to register form');
      msg('Account found but setup incomplete. Please register your company below.',true);
      hide($('f-login'));
      show($('f-register'));
      $('i-reg-email').value = auth.currentUser.email || '';
      auth.signOut();
      return;
    }
    CP={id:doc.id};
    var d=doc.data();
    for(var k in d) CP[k]=d[k];
    console.log('[LOADPROFILE] Profile loaded, companyId:',CP.companyId);

    return db.collection('companies').doc(CP.companyId).get();
  }).then(function(compDoc){
    if(!compDoc) return;
    console.log('[LOADPROFILE] Company doc exists?',compDoc.exists);
    if(!compDoc.exists){toast('Company not found.',false);auth.signOut();return;}
    CC={id:compDoc.id};
    var d=compDoc.data();
    for(var k in d) CC[k]=d[k];
    console.log('[LOADPROFILE] Calling initApp()');

    initApp();
  }).catch(function(e){
    console.error('[LOADPROFILE] Error:',e.code,e.message);
    toast('Error: '+e.message,false);
    auth.signOut();
  });
}

function loadDashboard(date){
  db.collection('routes').where('companyId','==',CC.id).where('routeDate','==',date).get()
  .then(function(snap){
    routes=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
    var total=routes.reduce(function(a,r){return a+(r.jobCount||0);},0);
    var done=routes.reduce(function(a,r){return a+(r.completedJobCount||0);},0);
    var pct=total?Math.round(done/total*100):0;
    if($('d-routes'))$('d-routes').textContent=routes.length;
    if($('d-pct'))$('d-pct').textContent=pct+'%';
    if($('d-jobs'))$('d-jobs').textContent=done+' of '+total+' jobs';
    if($('d-crews')){
      var s={};routes.forEach(function(r){s[r.crewId]=1;});
      $('d-crews').textContent=Object.keys(s).length;
    }
    var el=$('d-board');
    if(!el)return;
    if(!routes.length){el.innerHTML='<div class="empty"><div class="empty-i">🗓</div><div class="empty-t">No routes for '+date+'</div></div>';return;}
    el.innerHTML='<div class="row2">'+routes.map(function(r){
      var c=crew.find(function(x){return x.id===r.crewId;});
      var p=r.jobCount?Math.round((r.completedJobCount||0)/r.jobCount*100):0;
      return '<div class="rc" onclick="document.querySelector(\'[data-pg=routes]\').click();setTimeout(function(){selAndShow(\''+r.id+'\');},100)">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:7px;font-weight:600"><span class="crew-dot" style="background:'+(c?c.color:'#7c8499')+'"></span>'+esc(r.routeName)+'</div>'+badge(r.status)+'</div>'+

        '<div class="rmeta"><div><strong>'+(r.completedJobCount||0)+'</strong>/'+( r.jobCount||0)+' done</div><div><strong>'+p+'%</strong></div></div></div>';
    }).join('')+'</div>';
  });

// Route actions
function dispatchRoute(id){
  db.collection('routes').doc(id).update({status:'dispatched',dispatchedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){toast('Route dispatched!',true);selAndShow(id);});
}

function reopt(id,method){
  if(!selJobs.length){toast('No stops',false);return;}
  var dp=CC.dispatchLocation||{lat:0,lng:0};
  var result=method==='dist'?optDist(dp,selJobs):optTime(dp,selJobs);
  var batch=db.batch();
  result.forEach(function(j){batch.update(db.collection('jobs').doc(j.id),{sequence:j.sequence,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
  batch.commit().then(function(){toast('Optimized!',true);selAndShow(id);});
}

function splitR(id){
  if(selJobs.length<2)return;
  var half=Math.floor(selJobs.length/2);
  var second=selJobs.slice(half);
  var route=routes.find(function(r){return r.id===id;});
  db.collection('routes').add({
    companyId:CC.id,routeDate:route.routeDate,routeName:route.routeName+' (Split)',
    description:'Split from '+route.routeName,crewId:route.crewId,status:'draft',
    jobCount:second.length,completedJobCount:0,optimizationMethod:'manual',
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    var batch=db.batch();
    second.forEach(function(j,i){batch.update(db.collection('jobs').doc(j.id),{routeId:ref.id,sequence:i+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
    batch.update(db.collection('routes').doc(id),{jobCount:half,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    return batch.commit();
  }).then(function(){toast('Route split!',true);selAndShow(id);var dt=$('rt-dt');if(dt)loadRouteList(dt.value);});
}

function removeJob(jobId,routeId){
  if(!confirm('Remove this stop?'))return;
  db.collection('jobs').doc(jobId).delete().then(function(){
    return db.collection('routes').doc(routeId).get();
  }).then(function(doc){
    var cnt=Math.max(0,(doc.data().jobCount||1)-1);
    return db.collection('routes').doc(routeId).update({jobCount:cnt,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }).then(function(){toast('Removed',true);selAndShow(routeId);var dt=$('rt-dt');if(dt)loadRouteList(dt.value);});
}

// Drag & drop
function dragS(e,i){dragI=i;e.dataTransfer.effectAllowed='move';}
function dragO(e){e.preventDefault();}
function dragD(e,toI,routeId){
  e.preventDefault();
  if(dragI===null||dragI===toI)return;
  var arr=selJobs.slice();
  var moved=arr.splice(dragI,1)[0];
  arr.splice(toI,0,moved);
  var batch=db.batch();
  arr.forEach(function(j,i){batch.update(db.collection('jobs').doc(j.id),{sequence:i+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});});
  batch.commit().then(function(){dragI=null;toast('Reordered',true);selAndShow(routeId);});
}

function createRoute(){
  var name=$('nr-name').value.trim();
  var date=$('nr-date').value;
  var crewId=$('nr-crew').value;
  var desc=$('nr-desc').value;
  if(!name||!date||!crewId){toast('Name, date and crew required',false);return;}

  db.collection('routes').add({
    companyId:CC.id,routeDate:date,routeName:name,description:desc,crewId:crewId,
    status:'draft',optimizationMethod:_optMethod,
    jobCount:0,completedJobCount:0,totalEstimatedDuration:0,totalEstimatedDistance:0,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    var m=$('modal-nr');if(m)m.remove();
    toast('Route created!',true);

// ── Add Job Modal ────────────────────────────────────
var _addJobRoute=null;

function showAddJobModal(routeId){
  _addJobRoute=routeId;
  var locOpts=locs.map(function(l){return '<option value="'+l.id+'">'+esc(l.name)+(l.clientName?' — '+l.clientName:'')+'</option>';}).join('');

  var html='<div class="mo open" id="modal-aj" onclick="if(event.target===this)this.classList.remove(\'open\')">'+
    '<div class="md"><div class="md-h"><div class="md-t">Add Stop</div><button class="btn btn-g" onclick="$(\'modal-aj\').classList.remove(\'open\')">✕</button></div>'+
    '<div class="md-b">'+
    '<label>Location</label><select id="aj-loc"><option value="">Select…</option>'+locOpts+'</select>'+
    '<div class="row2"><div><label>Type</label><select id="aj-type"><option value="maintenance">Maintenance</option><option value="service">Service</option><option value="inspection">Inspection</option><option value="install">Install</option><option value="other">Other</option></select></div>'+
    '<div><label>Duration (min)</label><input type="number" id="aj-dur" value="30" min="5"/></div></div>'+
    '<label>Description</label><textarea id="aj-desc" rows="2" style="resize:none;margin-bottom:16px" placeholder="Grass cut, trim hedges…"></textarea>'+
    '<div class="row2"><div><label>Priority</label><select id="aj-pri"><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option><option value="low">Low</option></select></div>'+
    '<div><label>Time Window</label><input type="text" id="aj-tw" placeholder="08:00–17:00 (optional)"/></div></div>'+
    '</div><div class="md-f"><button class="btn btn-g" onclick="$(\'modal-aj\').classList.remove(\'open\')">Cancel</button>'+
    '<button class="btn btn-p" onclick="addJob()">Add Stop</button></div></div></div>';

  document.body.insertAdjacentHTML('beforeend',html);
}

function addJob(){
  var locId=$('aj-loc').value;
  if(!locId){toast('Select a location',false);return;}
  var loc=locs.find(function(l){return l.id===locId;});
  var route=routes.find(function(r){return r.id===_addJobRoute;});
  var seq=(route.jobCount||0)+1;

  db.collection('jobs').add({
    companyId:CC.id,routeId:_addJobRoute,routeDate:route.routeDate,crewId:route.crewId,
    locationId:locId,locationName:loc?loc.name:'',locationAddress:loc?loc.address:'',
    coordinates:loc?loc.coordinates:{lat:0,lng:0},
    sequence:seq,jobType:$('aj-type').value,
    description:$('aj-desc').value,
    estimatedDuration:parseInt($('aj-dur').value)||30,
    status:'pending',priority:$('aj-pri').value,
    timeWindow:{start:null,end:null},
    proofRequirements:{photoBefore:false,photoAfter:true,signature:false,notes:true,voiceRecording:false},
    upsellItems:[],
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    return db.collection('routes').doc(_addJobRoute).update({jobCount:seq,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }).then(function(){
    var m=$('modal-aj');if(m)m.remove();
    toast('Stop added!',true);
    selAndShow(_addJobRoute);
    var dt=$('rt-dt');if(dt)loadRouteList(dt.value);
  }).catch(function(e){toast(e.message,false);});
}

// ── Crew ─────────────────────────────────────────────

function addCrew(){

// ── Analytics ────────────────────────────────────────
function renderAnalytics(mc){
  var today=new Date().toISOString().slice(0,10);
  mc.innerHTML='<div class="pg on"><div class="pg-h"><div><div class="pg-t">Analytics</div><div class="pg-st">Planned vs Actual</div></div>'+
    '<input type="date" id="an-dt" value="'+today+'" style="margin-bottom:0;width:auto"/></div>'+
    '<div id="an-content"><p style="color:var(--td)">Loading…</p></div></div>';
  loadAnalytics(today);
  $('an-dt').onchange=function(){loadAnalytics(this.value);};
}

function loadAnalytics(date){
  var el=$('an-content');
  if(!el)return;
  db.collection('routes').where('companyId','==',CC.id).where('routeDate','==',date).get()
  .then(function(snap){
    var rs=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
    if(!rs.length){el.innerHTML='<div class="empty"><div class="empty-i">📈</div><div class="empty-t">No data for '+date+'</div></div>';return;}
    var totalJ=rs.reduce(function(a,r){return a+(r.jobCount||0);},0);
    var doneJ=rs.reduce(function(a,r){return a+(r.completedJobCount||0);},0);
    var pct=totalJ?Math.round(doneJ/totalJ*100):0;
    el.innerHTML='<div class="row3" style="margin-bottom:24px">'+
      '<div class="stat"><div class="stat-l">Completion</div><div class="stat-v">'+pct+'%</div><div class="stat-s">'+doneJ+' of '+totalJ+'</div></div>'+
      '<div class="stat"><div class="stat-l">Routes</div><div class="stat-v">'+rs.length+'</div></div>'+
      '<div class="stat"><div class="stat-l">Completed</div><div class="stat-v">'+rs.filter(function(r){return r.status==='completed';}).length+'</div></div></div>'+
      '<div class="card"><div class="sec-t">Per Crew — '+fmtDate(date)+'</div>'+
      '<table><thead><tr><th>Crew</th><th>Route</th><th>Stops</th><th>Done</th><th>Rate</th></tr></thead><tbody>'+
      rs.map(function(r){
        var c=crew.find(function(x){return x.id===r.crewId;});
        var p=r.jobCount?Math.round((r.completedJobCount||0)/r.jobCount*100):0;
        return '<tr><td><span class="crew-dot" style="background:'+(c?c.color:'#7c8499')+'"></span> '+(c?c.name:'—')+'</td><td>'+esc(r.routeName)+'</td><td>'+(r.jobCount||0)+'</td><td>'+(r.completedJobCount||0)+'</td><td><strong>'+p+'%</strong></td></tr>';
      }).join('')+'</tbody></table></div>';
  });
}

// ── Settings ─────────────────────────────────────────
function renderSettings(mc){
  mc.innerHTML='<div class="pg on"><div class="pg-h"><div><div class="pg-t">Settings</div><div class="pg-st">Proof-of-service & company</div></div></div>'+
    '<div class="row2">'+
    '<div class="card"><div class="sec-t">Proof of Service</div>'+
    '<div class="trow"><div><div class="tlabel">Before Photo</div><div class="tdesc">Required before starting</div></div><label class="tgl"><input type="checkbox" id="t-pb" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">After Photo</div><div class="tdesc">Required on completion</div></div><label class="tgl"><input type="checkbox" id="t-pa" onchange="savePOS()" checked/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Signature</div><div class="tdesc">Digital signature</div></div><label class="tgl"><input type="checkbox" id="t-sig" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Notes</div><div class="tdesc">Completion notes</div></div><label class="tgl"><input type="checkbox" id="t-nt" onchange="savePOS()" checked/><span class="tgl-s"></span></label></div>'+
    '<div class="trow"><div><div class="tlabel">Voice Recording</div><div class="tdesc">Voice note</div></div><label class="tgl"><input type="checkbox" id="t-vc" onchange="savePOS()"/><span class="tgl-s"></span></label></div>'+
    '</div>'+
    '<div class="card"><div class="sec-t">Company</div>'+
    '<label>Name</label><input type="text" id="set-name" value="'+esc(CC.name||'')+'"/>'+
    '<label>Dispatch Address</label><input type="text" id="set-addr" value="'+esc((CC.dispatchLocation||{}).address||'')+'"/>'+
    '<div class="row2"><div><label>Lat</label><input type="number" id="set-lat" value="'+((CC.dispatchLocation||{}).lat||'')+'" step="0.0001"/></div>'+
    '<div><label>Lng</label><input type="number" id="set-lng" value="'+((CC.dispatchLocation||{}).lng||'')+'" step="0.0001"/></div></div>'+
    '<button class="btn btn-p" onclick="saveCo()">Save</button></div></div></div>';

  // Load current POS settings
  db.collection('proofSettings').doc(CC.id).get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    if($('t-pb'))$('t-pb').checked=!!d.requirePhotoBefore;
    if($('t-pa'))$('t-pa').checked=!!d.requirePhotoAfter;
    if($('t-sig'))$('t-sig').checked=!!d.requireSignature;
    if($('t-nt'))$('t-nt').checked=!!d.requireNotes;
    if($('t-vc'))$('t-vc').checked=!!d.requireVoiceRecording;
  });
}

function savePOS(){
  db.collection('proofSettings').doc(CC.id).set({
    requirePhotoBefore:$('t-pb').checked,requirePhotoAfter:$('t-pa').checked,
    requireSignature:$('t-sig').checked,requireNotes:$('t-nt').checked,
    requireVoiceRecording:$('t-vc').checked,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).then(function(){toast('Saved',true);});
}

function saveCo(){
  var name=$('set-name').value.trim();
  var addr=$('set-addr').value.trim();
  var lat=parseFloat($('set-lat').value)||0;
  var lng=parseFloat($('set-lng').value)||0;
  db.collection('companies').doc(CC.id).update({
    name:name,dispatchLocation:{lat:lat,lng:lng,address:addr},
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    CC.name=name;CC.dispatchLocation={lat:lat,lng:lng,address:addr};
    $('s-co').textContent=name;
    toast('Saved',true);
  });
}

// Escape key closes modals
document.onkeydown=function(e){
  if(e.key==='Escape') document.querySelectorAll('.mo.open').forEach(function(m){m.remove();});
};
